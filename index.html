<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atendimento</title>
</head>
<body>

    <script>
        // Define o ID globalmente ANTES de qualquer outra coisa
        window.WebchatChannelId = '8851ff3a-a647-448b-9aa8-b53c6d351ca0';

        // Função que tenta clicar no botão assim que ele aparece
        function autoOpen() {
            const btn = document.querySelector('.webchat-fab-button') || 
                        document.querySelector('[class*="fab"]') ||
                        document.querySelector('button');
            if (btn) {
                btn.click();
            } else {
                setTimeout(autoOpen, 500);
            }
        }

        // Carrega o script do chat manualmente para garantir a ordem
        const script = document.createElement('script');
        <script src="https://zap.ola.app.br/webchat-fab.js" async></script>
        script.onload = () => {
            console.log("Script carregado, tentando abrir...");
            autoOpen();
        };
        document.body.appendChild(script);
    </script>

</body>
</html>
