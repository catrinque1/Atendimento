<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atendimento</title>
</head>
<body>
    <script>
        // Forçamos a variável no nível mais alto do navegador
        window.WebchatChannelId = '8851ff3a-a647-448b-9aa8-b53c6d351ca0';

        function iniciar() {
            var s = document.createElement('script');
            s.type = 'text/javascript';
            s.src = 'https://zap.ola.app.br/webchat-fab.js';
            // Garante que o ID seja lido ANTES do script rodar
            document.head.appendChild(s);

            s.onload = function() {
                var tentarAbrir = setInterval(function() {
                    var btn = document.querySelector('.webchat-fab-button') || document.querySelector('button');
                    if (btn) {
                        btn.click();
                        clearInterval(tentarAbrir);
                    }
                }, 500);
            };
        }

        window.onload = iniciar;
    </script>
</body>
</html>
