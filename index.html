<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atendimento</title>
</head>
<body>

    <script>
        // 1. Definimos o ID imediatamente
        window.WebchatChannelId = '8851ff3a-a647-448b-9aa8-b53c6d351ca0';

        // 2. Função para abrir o chat apenas quando ele estiver pronto
        function abrirChatQuandoPronto() {
            const botao = document.querySelector('.webchat-fab-button') || 
                         document.querySelector('[id*="webchat"]') ||
                         document.querySelector('button');

            if (botao) {
                botao.click();
                console.log("Chat iniciado!");
            } else {
                // Se o botão ainda não apareceu, tenta de novo em breve
                setTimeout(abrirChatQuandoPronto, 300);
            }
        }

        // Inicia a verificação assim que a página carrega
        window.onload = abrirChatQuandoPronto;
    </script>

    <!-- 3. Carregamos o script do WaTicket POR ÚLTIMO -->
    <script src="https://zap.ola.app.br/webchat-fab.js" async></script>

</body>
</html>
